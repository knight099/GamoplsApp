name: gamopls-teamcore

services:
  nats:
    image: nats:2-alpine
    container_name: gamopls-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  mqtt:
    image: eclipse-mosquitto:1.6
    container_name: gamopls-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"

volumes:
  nats-data:
