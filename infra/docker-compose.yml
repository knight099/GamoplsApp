name: gamopls-teamcore

services:
  nats:
    image: nats:2-alpine
    container_name: gamopls-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 256m

  # Mosquitto 2.x with anonymous access disabled (suggestions.md S-2) —
  # credentials + topic ACLs live in ./mosquitto/. Dev creds are
  # edgebox/changeme-dev-only (device write) and
  # core-ingestion/changeme-dev-only (service read).
  mqtt:
    image: eclipse-mosquitto:2
    container_name: gamopls-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./mosquitto/acl:/mosquitto/config/acl:ro
    mem_limit: 128m

volumes:
  nats-data:
