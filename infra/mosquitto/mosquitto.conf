# Mosquitto 2.x broker config (suggestions.md S-2).
#
# Anonymous access is disabled: every client must present credentials from
# the passwd file, and the acl file restricts which topics each user may
# read/write. The committed dev credentials are placeholders — a real
# deployment provisions per-device users (or client certificates) at Edge
# Box pairing time and derives tenancy from the authenticated identity.

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

persistence false
log_dest stdout
